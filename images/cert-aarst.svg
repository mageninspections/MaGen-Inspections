<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="aarstGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A5C2A"/>
      <stop offset="100%" style="stop-color:#2D8A42"/>
    </linearGradient>
    <linearGradient id="aarstGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#EDD068"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="url(#aarstGreen)" stroke="#C9A84C" stroke-width="3"/>
  <!-- Inner dashed ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#aarstGold)" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Center -->
  <circle cx="100" cy="100" r="78" fill="#1E6830"/>
  <!-- Shield shape -->
  <path d="M100,30 L130,48 L130,80 Q130,110 100,128 Q70,110 70,80 L70,48 Z" fill="#155022" stroke="url(#aarstGold)" stroke-width="1.5"/>
  <!-- Check inside shield -->
  <polyline points="84,82 95,93 116,68" stroke="#EDD068" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AARST text -->
  <text x="100" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="url(#aarstGold)" letter-spacing="3">AARST</text>
  <!-- Sub text -->
  <text x="100" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#AADDAA" letter-spacing="0.8">AMERICAN ASSOC. OF RADON</text>
  <text x="100" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#AADDAA" letter-spacing="0.8">SCIENTISTS &amp; TECHNOLOGISTS</text>
  <!-- Certified label -->
  <rect x="72" y="135" width="56" height="12" rx="6" fill="#155022" stroke="url(#aarstGold)" stroke-width="1"/>
  <text x="100" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="url(#aarstGold)" letter-spacing="1">MEMBER</text>
</svg>
