<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="epaBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366"/>
      <stop offset="100%" style="stop-color:#005A9C"/>
    </linearGradient>
    <linearGradient id="epaGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006633"/>
      <stop offset="100%" style="stop-color:#009944"/>
    </linearGradient>
    <linearGradient id="epaGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#EDD068"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="url(#epaBlue)" stroke="#C9A84C" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#epaGold)" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Center -->
  <circle cx="100" cy="100" r="78" fill="#00407A"/>
  <!-- Leaf / EPA emblem circle -->
  <circle cx="100" cy="88" r="28" fill="url(#epaGreen)" stroke="#009944" stroke-width="1"/>
  <!-- Leaf shape inside -->
  <path d="M100,68 Q118,75 118,88 Q118,104 100,110 Q82,104 82,88 Q82,75 100,68 Z" fill="#00BB55" opacity="0.5"/>
  <!-- EPA text -->
  <text x="100" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF" letter-spacing="2">EPA</text>
  <!-- Compliant badge -->
  <rect x="68" y="120" width="64" height="13" rx="6" fill="#003366" stroke="url(#epaGold)" stroke-width="1"/>
  <text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="url(#epaGold)" letter-spacing="1">COMPLIANT</text>
  <!-- Bottom labels -->
  <text x="100" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#AACCEE" letter-spacing="0.5">U.S. ENVIRONMENTAL</text>
  <text x="100" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#AACCEE" letter-spacing="0.5">PROTECTION AGENCY</text>
  <text x="100" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#EDD068" letter-spacing="0.5">PROTOCOLS &amp; GUIDELINES</text>
</svg>
